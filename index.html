<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牙科診所 SOP 文件系統</title>
<style>
:root {
  --primary: #4A7A85;
  --primary-dark: #2D5560;
  --primary-light: #DFF1F1;
  --primary-soft: #5A8A95;
  --accent: #FF0000;
  --accent-light: #FFF0F0;
  --warn: #C47D00;
  --warn-light: #FFF8E6;
  --danger: #FF0000;
  --danger-light: #FFF0F0;
  --muted: #8AACB4;
  --handle: #BBD5DA;
  --panel: #DFF1F1;
  --panel-strong: #BBD5DA;
  --text: #1E3A42;
  --text-muted: #6A8A92;
  --border: rgba(187,213,218,0.7);
  --bg: #F5F5F5;
  --sidebar-w: 280px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Noto Sans TC", sans-serif; color: var(--text); background: var(--bg); display: flex; min-height: 100vh; }

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: #fff; color: var(--text);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; height: 100vh;
  overflow-y: auto; z-index: 100;
  border-right: 1px solid var(--panel-strong);
}
#sidebar-header { padding: 22px 18px 16px; border-bottom: 1px solid var(--border); }
#sidebar-header h1 { font-size: 14px; color: var(--text); font-weight: 700; line-height: 1.5; }
#sidebar-header p { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
#search-wrap { padding: 10px 14px; border-bottom: 1px solid var(--border); }
#search { width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
#search::placeholder { color: var(--text-muted); }
#search:focus { border-color: var(--primary); background: #fff; }
.nav-section { padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
.nav-section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; color: var(--muted); padding: 6px 16px 4px; text-transform: uppercase; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 16px; cursor: pointer; font-size: 13px; color: var(--text); border-left: 3px solid transparent; transition: all .15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-item:hover { background: var(--panel); color: var(--primary); }
.nav-item.active { background: var(--primary-light); color: var(--primary); border-left-color: var(--accent); font-weight: 600; }
.nav-item .tag { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--panel-strong); color: var(--primary); flex-shrink: 0; margin-left: auto; }
.nav-item.active .tag { background: var(--accent); color: #fff; }

/* ── Main ── */
#main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; }
#topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 12px 32px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50; }
#doc-title { font-size: 18px; font-weight: 700; color: var(--text); flex: 1; }
.btn { padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-dark); }
#content { padding: 32px; max-width: 900px; }

/* ── Doc content ── */
.doc h1 { font-size: 26px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.doc .meta { font-size: 12px; color: var(--text-muted); margin-bottom: 28px; display: flex; gap: 12px; flex-wrap: wrap; }
.doc .meta span { background: var(--bg); padding: 2px 8px; border-radius: 4px; }
.doc h2 { font-size: 18px; font-weight: 700; color: var(--primary); margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 2px solid var(--panel-strong); }
.doc h3 { font-size: 15px; font-weight: 700; color: var(--text); margin: 20px 0 8px; }
.doc p { line-height: 1.8; margin-bottom: 10px; }
.doc ul, .doc ol { padding-left: 22px; margin-bottom: 12px; }
.doc li { line-height: 1.9; font-size: 14.5px; }
.doc table { width: 100%; border-collapse: collapse; margin: 14px 0 20px; font-size: 14px; }
.doc th { background: var(--primary); color: #fff; padding: 9px 12px; text-align: left; font-weight: 600; }
.doc td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
.doc tr:nth-child(even) td { background: var(--panel); }
.doc code { background: #f0f3f7; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 13px; }
.doc pre { background: #1a2332; color: #a8c7e8; padding: 16px 20px; border-radius: 8px; margin: 14px 0; overflow-x: auto; font-size: 13px; line-height: 1.7; }

/* Callouts */
.callout { border-radius: 8px; padding: 14px 16px; margin: 16px 0; border-left: 4px solid; }
.callout-note { background: var(--panel); border-color: var(--primary); }
.callout-warn { background: var(--warn-light); border-color: var(--warn); }
.callout-danger { background: var(--accent-light); border-color: var(--accent); }
.callout-tip { background: var(--panel); border-color: var(--panel-strong); }
.callout-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
.callout-note .callout-title { color: var(--primary); }
.callout-warn .callout-title { color: var(--warn); }
.callout-danger .callout-title { color: var(--accent); }
.callout-tip .callout-title { color: var(--primary-soft); }

/* Checklist */
.checklist { list-style: none; padding: 0; margin: 12px 0 18px; }
.checklist li { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; font-size: 14.5px; line-height: 1.6; border-bottom: 1px solid #f0f3f7; }
.checklist li:last-child { border-bottom: none; }
.checklist input[type=checkbox] { width: 16px; height: 16px; margin-top: 3px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
.checklist label { cursor: pointer; }
.checklist input:checked + label { text-decoration: line-through; color: var(--text-muted); }

/* Badge */
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
.badge-pre { background: var(--panel-strong); color: var(--primary-dark); }
.badge-qm  { background: var(--primary); color: #fff; }
.badge-qp  { background: var(--primary-soft); color: #fff; }
.badge-wsop{ background: var(--primary-dark); color: var(--handle); }
.badge-ck  { background: var(--accent); color: #fff; }

/* Home page */
.home-hero { background: transparent; color: var(--text); padding: 36px 0 28px; border-radius: 0; margin-bottom: 28px; border-bottom: 2px solid var(--panel-strong); }
.home-hero-tag { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--primary); background: var(--panel); border: 1px solid var(--panel-strong); padding: 3px 10px; border-radius: 4px; margin-bottom: 14px; }
.home-hero h1 { font-size: 34px; font-weight: 800; color: var(--text); margin-bottom: 10px; line-height: 1.2; }
.home-hero p { font-size: 15px; color: var(--text-muted); line-height: 1.7; max-width: 640px; }
.home-stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 28px; }
.stat-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 18px; text-align: center; }
.stat-num { font-size: 32px; font-weight: 800; color: var(--primary-soft); }
.stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.doc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.doc-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 16px; cursor: pointer; transition: all .15s; }
.doc-card:hover { border-color: var(--primary); box-shadow: 0 2px 12px rgba(45,74,85,.12); transform: translateY(-1px); }
.doc-card-id { font-size: 11px; color: var(--text-muted); font-weight: 700; letter-spacing: .5px; }
.doc-card-title { font-size: 14px; font-weight: 700; margin: 4px 0; }
.doc-card-desc { font-size: 12.5px; color: var(--text-muted); line-height: 1.5; }
.section-header { font-size: 13px; font-weight: 700; color: var(--text-muted); letter-spacing: .5px; margin: 24px 0 10px; text-transform: uppercase; }

/* Pyramid */
.pyramid { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin: 20px 0; }
.pyramid-row { display: flex; justify-content: center; margin-bottom: 6px; }
.pyramid-block { border-radius: 6px; padding: 10px 20px; text-align: center; font-weight: 700; font-size: 13px; color: #fff; }

/* Progress bar */
.progress-bar { background: #e8edf2; border-radius: 4px; height: 6px; margin: 6px 0 14px; }
.progress-fill { background: var(--primary); height: 100%; border-radius: 4px; transition: width .3s; }

/* Print */
@media print {
  #sidebar, #topbar { display: none; }
  #main { margin-left: 0; }
  #content { padding: 20px; }
}

/* Mobile */
@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); transition: transform .25s; }
  #sidebar.open { transform: translateX(0); }
  #main { margin-left: 0; }
  .home-stats { grid-template-columns: repeat(3, 1fr); }
  .doc-grid { grid-template-columns: 1fr; }
  #content { padding: 18px; }
}
.menu-btn { display: none; }
@media (max-width: 768px) { .menu-btn { display: flex; } }
</style>
</head>

<!-- Sidebar -->
<nav id="sidebar">

<h3>牙科水路（Dental Unit Waterline）管理</h3>
<table><tr><th>頻率</th><th>動作</th></tr>
<tr><td>每日開診前</td><td>各水路放水 30 秒後開始使用</td></tr>

<tr><td>每半年</td><td>送水樣本至合格實驗室檢測菌落數</td></tr></table>
<h2>二、器械滅菌流程</h2>
<pre>使用後器械 → 流水沖洗 → 超音波清洗（10–15 分鐘）
→ 沖洗擦乾 → 目視檢查 → 紙塑袋包裝 + 封口
→ 貼標籤（日期/批號/效期）→ 高壓滅菌（134°C/18分鐘）
→ 確認指示劑變色 ✓ → 乾燥存放</pre>
<h2>三、廢棄物分類</h2>
<table><tr><th>種類</th><th>容器</th><th>範例</th></tr>
<tr><td>感染性廢棄物</td><td>紅色廢棄物袋</td><td>血液沾染紗布、手套、口罩</td></tr>
<tr><td>尖銳物</td><td>銳器桶（黃色）</td><td>針頭、刀片、銼刀</td></tr>
<tr><td>一般垃圾</td><td>一般垃圾袋</td><td>未沾血的紙巾、包裝</td></tr></table>
<h2>四、針扎事件緊急處理</h2>
<div class="callout callout-danger"><div class="callout-title">🚨 發生針扎立即執行</div></div>
<ul class="checklist" id="chk-pre04-2">
<li><input type="checkbox"><label>立即脫除手套</label></li>
<li><input type="checkbox"><label>傷口流水沖洗至少 15 分鐘（不可擠壓）</label></li>
<li><input type="checkbox"><label>通知主管</label></li>
<li><input type="checkbox"><label>填寫針扎事件報告表</label></li>
<li><input type="checkbox"><label>評估源頭患者風險（HIV / HBV / HCV 快篩）</label></li>
<li><input type="checkbox"><label>就醫評估（PEP 預防用藥需在 72 小時內開始）</label></li>
<li><input type="checkbox"><label>後續追蹤（6 週、3 個月、6 個月）</label></li></ul>`
},
{id:'PRE-05', cat:'PRE', title:'健保申報 SOP', badge:'badge-pre',
 desc:'月度申報時程、自查指標、審查應對、申復流程',
 content:`
<h2>每月申報時程</h2>
<table><tr><th>時段</th><th>申報案件</th><th>截止日</th></tr>
<tr><td>1 日–15 日</td><td>上半月醫療服務</td><td>次月 10 日前</td></tr>
<tr><td>16 日–月底</td><td>下半月醫療服務</td><td>次月 20 日前</td></tr>
<tr><td>全月（整批）</td><td>當月全部案件</td><td>次月 20 日前</td></tr></table>
<div class="callout callout-danger"><div class="callout-title">⚠ 逾期申報後果</div>未依期限申報者，申報當月不予暫付；延遲申報可能被列為異常案件。</div>
<h2>申報前自查清單</h2>
<ul class="checklist" id="chk-pre05-1">
<li><input type="checkbox"><label>每位患者當月就診有主訴、處置記錄、X 光或照片</label></li>
<li><input type="checkbox"><label>侵入性治療有同意書（拔牙、根管、手術）</label></li>
<li><input type="checkbox"><label>技工單日期能對應申報項目</label></li>
<li><input type="checkbox"><label>申報處置碼與病歷記載一致</label></li>
<li><input type="checkbox"><label>根管治療：申報次數與工作長度測量、根尖 X 光相符</label></li>
<li><input type="checkbox"><label>牙周治療：Periodontal Charting 有書面或數位記錄</label></li></ul>
<h2>健保三層管控機制</h2>
<table><tr><th>層級</th><th>觸發情境</th><th>要求提供</th></tr>
<tr><td>輔導</td><td>申報量異常、點值偏高</td><td>醫日報表、申報案件明細</td></tr>
<tr><td>醫療確認單</td><td>前項後仍異常</td><td>醫療確認單（逐案說明）</td></tr>
<tr><td>醫療品質監控期</td><td>持續異常或重大疑義</td><td>確認單 + 診療證明文件</td></tr></table>
<h2>收到公文後處理流程</h2>
<pre>收到公文 → 指定負責人、建立案件編號
  ↓ 確認回覆期限（通常 14–30 天）
  ↓ 整理病歷、X 光、照片、同意書、技工單
  ↓ 治療醫師補充 Clinical Rationale
  ↓ 負責醫師審閱確認
  ↓ 送件（保留版本 + 附件清單）
  ↓ 記錄後續結果</pre>`
},
{id:'PRE-06', cat:'PRE', title:'病歷與同意書 SOP', badge:'badge-pre',
 desc:'SOAP 格式、各療程同意書、廣告合規 SOP',
 content:`
<h2>初診病歷必填欄位</h2>
<table><tr><th>欄位</th><th>內容</th></tr>
<tr><td>主訴</td><td>患者來診主要原因，以患者用語記錄</td></tr>
<tr><td>過敏史</td><td>藥物、麻醉藥、材料過敏（無過敏記錄「NKA」）</td></tr>
<tr><td>系統性疾病</td><td>糖尿病、高血壓、心臟病、骨質疏鬆、服藥狀況</td></tr>
<tr><td>口腔檢查</td><td>牙齒現況、缺牙、修復物、軟組織</td></tr>
<tr><td>X 光讀片</td><td>初診全口 X 光臨床意義</td></tr>
<tr><td>治療計畫</td><td>建議療程優先順序說明</td></tr></table>
<h2>SOAP 格式（每次就診）</h2>
<table><tr><th>項目</th><th>說明</th></tr>
<tr><td><strong>S</strong>ubjective</td><td>患者主訴（今天有什麼問題、感覺）</td></tr>
<tr><td><strong>O</strong>bjective</td><td>臨床發現（探測、視診、X 光、冷熱測試等）</td></tr>
<tr><td><strong>A</strong>ssessment</td><td>診斷（用正確診斷名稱，必要時附 ICD 碼）</td></tr>
<tr><td><strong>P</strong>lan</td><td>治療計畫 + 今日執行 + 下次療程說明</td></tr></table>
<h2>需取得同意書的情境</h2>
<table><tr><th>情境</th><th>同意書種類</th></tr>
<tr><td>所有患者初診</td><td>一般診療同意書（含個資使用同意）</td></tr>
<tr><td>牙齒拔除</td><td>拔牙手術同意書</td></tr>
<tr><td>根管治療</td><td>根管治療同意書</td></tr>
<tr><td>植牙手術</td><td>植牙手術同意書（含補骨、上頜竇手術等）</td></tr>
<tr><td>牙周手術</td><td>牙周手術同意書</td></tr>
<tr><td>未成年人</td><td>法定代理人（家長）簽署</td></tr></table>
<div class="callout callout-warn"><div class="callout-title">📣 醫療廣告合規</div>
<strong>禁止</strong>：宣稱療效保證/成功率、使用 Before/After 照片（未核准）、誇大療效<br>
<strong>合規</strong>：診所名稱地址電話、看診時間、醫師姓名學歷、服務科別</div>`
},
{id:'PRE-07', cat:'PRE', title:'合夥治理 Checklist', badge:'badge-pre',
 desc:'股權、決策門檻、退出條款、行政醫師職責',

},

{id:'QM-01', cat:'QM', title:'診所管理手冊', badge:'badge-qm',
 desc:'使命、願景、組織架構、醫師雙重角色、管理總則',
 content:`
<h2>診所核心理念</h2>
<table><tr><th>項目</th><th>內容</th></tr>
<tr><td><strong>使命</strong></td><td>為患者提供安全、舒適、高品質的牙科醫療服務，以專業和同理心建立長期信賴關係。</td></tr>
<tr><td><strong>願景</strong></td><td>成為社區首選的全科牙醫診所，建立可複製的標準化營運體系，具備連鎖擴張能力。</td></tr></table>
<h3>核心價值</h3>
<ul>
<li><strong>專業</strong>：持續精進臨床技術，以 Evidence-Based 醫療為基礎</li>
<li><strong>誠信</strong>：對患者誠實說明療程與費用，不誇大不欺瞞</li>
<li><strong>效率</strong>：SOP 化日常流程，讓每位員工都能達到穩定水準</li>
<li><strong>關懷</strong>：患者的關心不止於診療，更延伸至術後追蹤</li></ul>
<h2>組織架構</h2>
<pre>院長
├── 主治醫師
│   └── 跟診助理（各診）
└── 診所主管（行政長）
    ├── 前台助理
    └── 清潔/庶務</pre>
<h2>醫師的雙重角色</h2>
<table><tr><th>面向</th><th>職責</th></tr>
<tr><td>醫病關係</td><td>提供專業診療技術、應對患者各種需求、符合社會對醫師的期待</td></tr>
<tr><td>診所經營</td><td>為診所帶來穩定業績、治療時適時介紹其他療程、建立個人品牌形象</td></tr></table>
<div class="callout callout-note"><div class="callout-title">💡 核心觀念</div>醫師當然要有專業，但又不能只有醫療專業。</div>
<h2>SOP 文件層級</h2>
<div class="pyramid">
<div class="pyramid-row"><div class="pyramid-block" style="background:#162028;width:180px">QM 管理手冊</div></div>
<div class="pyramid-row"><div class="pyramid-block" style="background:#2D4A55;width:260px">QP 人員管理作業程序</div></div>
<div class="pyramid-row"><div class="pyramid-block" style="background:#3A5562;width:340px">WSOP 各站工作程序</div></div>
<div class="pyramid-row"><div class="pyramid-block" style="background:#7A98A4;width:420px">CK 日常 Checklist + 再考核表</div></div>
</div>`
},

{id:'QP-01', cat:'QP', title:'人員管理作業程序', badge:'badge-qp',
 desc:'招募原則、到職訓練、試用期考核、晉升路徑、離職流程',
 content:`

{id:'QP-02', cat:'QP', title:'員工手冊', badge:'badge-qp',
 desc:'班表、請假規定、服裝儀容、保密義務、緊急狀況',
 content:`
<h2>請假制度</h2>
<table><tr><th>假別</th><th>規定</th></tr>
<tr><td>特休</td><td>依年資依法給予（1年：3天；2年：7天；3年：10天…）</td></tr>
<tr><td>病假</td><td>每年 30 天，半薪；超過 3 日需就醫證明</td></tr>
<tr><td>事假</td><td>每年 14 天，無薪</td></tr>
<tr><td>生理假</td><td>每月 1 天，半薪</td></tr>
<tr><td>婚假</td><td>8 天，全薪</td></tr>
<tr><td>喪假</td><td>依親疏遠近 3–8 天，全薪</td></tr></table>
<h2>服裝儀容</h2>
<table><tr><th>項目</th><th>規定</th></tr>
<tr><td>工作服</td><td>診所提供，每日整潔穿著，不可私自改裝</td></tr>
<tr><td>頭髮</td><td>工作中需束起，不染誇張髮色</td></tr>
<tr><td>飾品</td><td>進入診療區禁止戴戒指、手鐲（感染控制要求）</td></tr>
<tr><td>指甲</td><td>跟診人員不可留長指甲、不可貼假甲</td></tr>
<tr><td>鞋子</td><td>包頭鞋，不可穿拖鞋或涼鞋</td></tr></table>
<h2>行為規範</h2>
<h3>對患者</h3>
<ul>
<li>任何時候保持禮貌、耐心</li>
<li>不在候診區討論其他患者病情或費用</li>
<li>不私下收受患者紅包（超過 NT$200 者須告知主管）</li>
<li>患者個資絕對保密</li></ul>
<h2>保密義務</h2>
<div class="callout callout-warn"><div class="callout-title">⚠ 離職後 2 年內仍適用</div>不得洩露：患者名單/病歷、內部營運數據、SOP 文件、員工薪資與人事資訊。違反者診所保留法律追訴權。</div>
<h2>緊急狀況速查</h2>
<table><tr><th>情況</th><th>處理方式</th></tr>
<tr><td>患者暈厥</td><td>立即通知醫師，啟動急救程序</td></tr>
<tr><td>針扎事件</td><td>立即沖水 15 分鐘 → 通知主管 → 填報告 → 就醫</td></tr>
<tr><td>火災</td><td>通知疏散 → 撥打 119 → 不可乘電梯</td></tr>
<tr><td>患者抱怨</td><td>不爭辯，立即安撫 → 通知主管處理</td></tr></table>`
},
{id:'QP-03', cat:'QP', title:'獎金與考核制度', badge:'badge-qp',
 desc:'底薪結構、KPI 項目、月度考核週期、晉升薪資表',
 content:`
<h2>薪資組成</h2>

<tr><td>跟診助理</td><td>NT$28,000</td><td>NT$30,000–36,000</td><td>NT$36,000–42,000</td></tr>
<tr><td>組長/主管</td><td>—</td><td>NT$38,000–45,000</td><td>NT$45,000+</td></tr></table>

<table><tr><th>項目</th><th>權重</th></tr>
<tr><td>回診率</td><td>30%</td></tr>
<tr><td>新患者滿意度</td><td>20%</td></tr>
<tr><td>訊息回覆速度（1小時內）</td><td>20%</td></tr>
<tr><td>SOP 執行度</td><td>20%</td></tr>
<tr><td>帳務正確性</td><td>10%</td></tr></table>
<h2>個人 KPI — 跟診助理</h2>
<table><tr><th>項目</th><th>權重</th></tr>
<tr><td>器械準備正確率</td><td>30%</td></tr>
<tr><td>SOP 執行度</td><td>30%</td></tr>
<tr><td>滅菌記錄完整性</td><td>20%</td></tr>
<tr><td>態度與配合度</td><td>20%</td></tr></table>
<h2>特別獎勵制度</h2>
<table><tr><th>項目</th><th>獎勵</th></tr>
<tr><td>員工推薦新員工（試用通過）</td><td>推薦獎金</td></tr>
<tr><td>患者留下五星好評且點名員工</td><td>即時獎勵</td></tr>
<tr><td>提出有效改善建議（採用）</td><td>建議獎金</td></tr>
<tr><td>連續 6 個月全勤</td><td>額外特休 1 天</td></tr></table>`
},

{id:'WSOP-01', cat:'WSOP', title:'開診流程', badge:'badge-wsop',

<h2>開診 SOP（09:30–10:00）</h2>

<li><input type="checkbox"><label>前台區：桌面整理、收費台清潔</label></li>
<li><input type="checkbox"><label>廁所：確認清潔、補充衛生紙、洗手乳</label></li>

<h3>3. 設備開機（09:40）</h3>

<li><input type="checkbox"><label>開啟 X 光設備（暖機）</label></li>
<li><input type="checkbox"><label>開啟診療椅電源、吸唾器、空壓機</label></li></ul>
<h3>4. 耗材確認與補充（09:45）</h3>
<ul class="checklist" id="chk-wsop01-4">

<li><input type="checkbox"><label>手術室器械台耗材確認</label></li>

{id:'WSOP-03', cat:'WSOP', title:'前台接待流程', badge:'badge-wsop',
 desc:'預約管理、到診接待、候診、收費、離院追蹤及話術',
 content:`
<h2>患者接觸點全流程</h2>
<pre>線上搜尋 → 預約 → 到診接待 → 候診 → 就診 → 收費 → 離院追蹤</pre>
<h2>一、預約管理</h2>
<h3>電話預約問候語</h3>
<div class="callout callout-tip"><div class="callout-title">標準話術</div>「您好，OO牙科，我是XXX，請問有什麼需要幫忙的？」<br>結束語：「感謝您的預約，[日期][時間] 我們等您，再見。」</div>
<h2>二、到診接待</h2>
<h3>初診</h3>
<ul class="checklist" id="chk-wsop03-1">
<li><input type="checkbox"><label>熱情問候，確認姓名與預約時段</label></li>
<li><input type="checkbox"><label>請填寫初診基本資料表</label></li>
<li><input type="checkbox"><label>告知候診約需等待時間</label></li>
<li><input type="checkbox"><label>帶至候診區就座，提供飲水</label></li></ul>
<h2>三、收費結帳</h2>
<ul class="checklist" id="chk-wsop03-2">
<li><input type="checkbox"><label>確認今日治療項目</label></li>
<li><input type="checkbox"><label>告知費用明細（健保部分負擔 + 自費分開說明）</label></li>
<li><input type="checkbox"><label>收取費用，開立收據</label></li>
<li><input type="checkbox"><label>告知下次預約並登錄系統</label></li></ul>
<h2>四、常用話術</h2>
<table><tr><th>情境</th><th>建議話術</th></tr>
<tr><td>費用較高時</td><td>「這個療程費用是 $X，我可以幫您說明明細，有任何問題也可以問醫師。」</td></tr>
<tr><td>患者猶豫</td><td>「完全沒關係，您可以帶資料回去考慮，有問題隨時傳訊息。」</td></tr>
<tr><td>等太久道歉</td><td>「非常抱歉讓您久等了，醫師目前正在處理一個需要多一點時間的療程。」</td></tr></table>`
},

{id:'WSOP-05', cat:'WSOP', title:'耗材盤點流程', badge:'badge-wsop',

{id:'WSOP-06', cat:'WSOP', title:'技工單處理流程', badge:'badge-wsop',
 desc:'出貨、入貨核對、退件處理、逾期假牙管理',
 content:`
<h2>技工單生命週期</h2>
<pre>確認需求 → 填寫技工單 → 準備模型/數位檔 → 打包出貨
  ↓ 出貨登記 → 技工所製作 → 送回入貨
  ↓ 核對品項 → 通知患者 → 試戴/裝戴 → 歸檔</pre>
<h2>技工單必填欄位</h2>

<tr><td>製作品項</td><td>詳細描述（如：#14 PFM Crown，鈦合金底層）</td></tr>
<tr><td>顏色/色號</td><td>使用 Vita 色卡，附照片更佳</td></tr>
<tr><td>Implant Crown 特別注意</td><td>植體品牌、型號、掃描體型號、連接方式</td></tr>
<tr><td>預計回件日期</td><td>與技工所確認後填寫</td></tr></table>
<h2>入貨核對</h2>
<ul class="checklist" id="chk-wsop06-1">
<li><input type="checkbox"><label>患者姓名/病歷號正確</label></li>
<li><input type="checkbox"><label>品項與技工單一致</label></li>
<li><input type="checkbox"><label>顏色/色號符合要求</label></li>
<li><input type="checkbox"><label>外觀無明顯瑕疵（裂縫、氣泡、邊緣不整）</label></li>
<li><input type="checkbox"><label>技工所送件收據簽收存檔</label></li></ul>
<h2>逾期假牙處理</h2>
<table><tr><th>狀況</th><th>處理</th></tr>
<tr><td>超過 30 天未取件</td><td>主動致電確認意願</td></tr>
<tr><td>超過 3 個月未取件</td><td>通知院長，書面告知保存期限</td></tr></table>`
},
{id:'WSOP-07', cat:'WSOP', title:'緊急醫療處置 SOP', badge:'badge-wsop',
 desc:'昏厥、過敏性休克、低血糖、高血壓危象、CPR 五大情境',
 content:`
<div class="callout callout-danger"><div class="callout-title">🚨 急救設備位置（開業前填入）</div>
AED：＿＿＿＿ | 急救藥物箱：＿＿＿＿ | 最近急診室：＿＿＿＿（約 ＿＿ 分鐘）</div>
<h2>情境一：血管迷走性昏厥（最常見）</h2>
<p><strong>辨識</strong>：臉色蒼白、冒冷汗、噁心、脈搏微弱</p>
<ul class="checklist" id="chk-wsop07-1">
<li><input type="checkbox"><label>立即讓患者平躺，雙腳抬高</label></li>
<li><input type="checkbox"><label>鬆開頸部及胸部衣物</label></li>
<li><input type="checkbox"><label>意識清醒時提供糖分（糖果、果汁）</label></li>
<li><input type="checkbox"><label>每 3–5 分鐘測量血壓、脈搏</label></li>
<li><input type="checkbox"><label>通常 5–10 分鐘自行恢復，恢復後休息 15–30 分鐘</label></li></ul>
<h2>情境二：過敏性休克（Anaphylaxis）</h2>
<div class="callout callout-danger"><div class="callout-title">辨識：喉嚨緊縮、呼吸困難、低血壓、意識改變——三者之一即須立即處置</div></div>
<ul class="checklist" id="chk-wsop07-2">
<li><input type="checkbox"><label>立即呼叫 119</label></li>
<li><input type="checkbox"><label>Epinephrine 0.3mg IM（大腿外側）立即注射</label></li>
<li><input type="checkbox"><label>5–15 分鐘無改善可重複第二劑</label></li>
<li><input type="checkbox"><label>給氧、監測生命徵象直到救護車到達</label></li></ul>
<h2>情境三：低血糖</h2>
<p><strong>有意識可吞嚥</strong>：給予 15–20g 糖分（果汁 150mL / 葡萄糖錠 4 粒）→ 等 15 分鐘重新評估</p>
<p><strong>意識不清</strong>：立即呼叫 119，不可強迫口服，考慮 Glucagon 肌注</p>
<h2>情境四：心臟驟停（CPR）</h2>
<pre>呼叫 119 + 拿 AED（同時進行）
  ↓
C — 胸外按壓：深度 5cm，速率 100–120次/分，30:2
A — 打開呼吸道（仰頭抬下巴）
B — 人工呼吸（每次 1 秒）
  ↓
AED 到達 → 開機 → 貼電極片 → 分析 → 電擊
  ↓
持續 CPR 直到救護車到達</pre>
<h2>角色分工</h2>
<table><tr><th>角色</th><th>職責</th></tr>
<tr><td>醫師</td><td>主導 CPR，指揮全程</td></tr>
<tr><td>跟診助理 1</td><td>執行胸外按壓（輪替）</td></tr>
<tr><td>跟診助理 2</td><td>拿 AED、操作 AED</td></tr>
<tr><td>前台</td><td>打 119、清場候診區、引導救護車</td></tr></table>
<div class="callout callout-tip"><div class="callout-title">💡 每半年模擬演練一次</div>隨機選定情境，計時從發現到正確處置的時間；確認每位員工知道急救設備位置；確認 AED 電極片、急救藥物效期。</div>`
},
{id:'WSOP-08', cat:'WSOP', title:'患者投訴處理 SOP', badge:'badge-wsop',
 desc:'L1–L3 分級應對、線上負評回應格式、投訴記錄表',
 content:`
<h2>投訴分級</h2>
<table><tr><th>等級</th><th>情境</th><th>處理人</th></tr>
<tr><td>L1：一般抱怨</td><td>等太久、費用疑問、態度不滿</td><td>前台助理</td></tr>
<tr><td>L2：服務糾紛</td><td>療效不如預期、要求重做或退費</td><td>診所主管</td></tr>
<tr><td>L3：醫療糾紛</td><td>疑似醫療疏失、身體傷害、法律威脅</td><td>院長 + 法律顧問</td></tr></table>
<h2>L1 黃金原則</h2>
<div class="callout callout-tip"><div class="callout-title">先處理情緒，再處理問題</div>
1. 不爭辯：「您說得對，這讓您感到不方便，非常抱歉。」<br>
2. 引導至私下空間：「方便請您到這邊，我們找個地方好好聊聊。」<br>
3. 傾聽完整，不中途打斷<br>
4. 確認核心訴求<br>
5. 結尾：「感謝您告訴我們，這對我們改善服務非常重要。」</div>
<h2>L3 醫療糾紛第一原則</h2>

// ── Navigation ──────────────────────────────────────────────────
const CATS = {
  home: { label: '首頁', icon: '🏠' },
  PRE:  { label: '開業前期 PRE', icon: '📋' },
  QM:   { label: '管理手冊 QM', icon: '📖' },
  QP:   { label: '人員管理 QP', icon: '👥' },
  WSOP: { label: '各站流程 WSOP', icon: '⚙️' },
  CK:   { label: '日常 Checklist', icon: '✅' }
};

function buildNav() {
  const tree = document.getElementById('nav-tree');
  const grouped = {};
  DOCS.forEach(d => {
    if (!grouped[d.cat]) grouped[d.cat] = [];
    grouped[d.cat].push(d);
  });
  Object.entries(CATS).forEach(([cat, info]) => {
    if (!grouped[cat]) return;
    const sec = document.createElement('div');
    sec.className = 'nav-section';
    if (cat !== 'home') {
      const t = document.createElement('div');
      t.className = 'nav-section-title';
      t.textContent = info.icon + ' ' + info.label;
      sec.appendChild(t);
    }
    grouped[cat].forEach(d => {
      const item = document.createElement('div');
      item.className = 'nav-item' + (d.id === 'HOME' ? ' active' : '');
      item.dataset.id = d.id;
      item.innerHTML = `<span style="flex:1;overflow:hidden;text-overflow:ellipsis">${d.id === 'HOME' ? '🏠 文件總覽' : d.title}</span>` +
        (d.badge ? `<span class="tag">${d.id}</span>` : '');
      item.onclick = () => navigate(d.id);
      sec.appendChild(item);
    });
    tree.appendChild(sec);
  });
}

function navigate(id) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  const doc = DOCS.find(d => d.id === id);
  document.getElementById('doc-title').textContent = id === 'HOME' ? '文件總覽' : `${id} — ${doc.title}`;
  const content = document.getElementById('content');
  if (id === 'HOME') {
    renderHome(content);
  } else {
    renderDoc(content, doc);
  }
  window.scrollTo(0, 0);
}

function renderHome(el) {
  const cats = ['PRE','QM','QP','WSOP','CK'];
  const counts = {};
  cats.forEach(c => counts[c] = DOCS.filter(d => d.cat === c).length);
  el.innerHTML = `
  <div class="home-hero">
    <div class="home-hero-tag">Taiwan Dental Clinic · SOP System</div>
    <h1>牙科診所<br>SOP 文件系統</h1>
    <p>從開業申請到日常營運的完整標準作業程序，共 ${DOCS.length - 1} 份文件，涵蓋法規、人員、流程、財務、緊急應對等各面向。</p>
  </div>
  <div class="home-stats">
    <div class="stat-card"><div class="stat-num">${DOCS.length - 1}</div><div class="stat-label">總文件數</div></div>
    ${cats.map(c => `<div class="stat-card"><div class="stat-num">${counts[c]}</div><div class="stat-label">${CATS[c].label.split(' ')[0]}</div></div>`).join('')}
  </div>
  ${cats.map(cat => `
  <div class="section-header">${CATS[cat].icon} ${CATS[cat].label}</div>
  <div class="doc-grid">
    ${DOCS.filter(d => d.cat === cat).map(d => `
    <div class="doc-card" onclick="navigate('${d.id}')">
      <div class="doc-card-id"><span class="badge ${d.badge}">${d.id}</span></div>
      <div class="doc-card-title">${d.title}</div>
      <div class="doc-card-desc">${d.desc}</div>
    </div>`).join('')}
  </div>`).join('')}`;
}

function renderDoc(el, doc) {
  el.innerHTML = `<div class="doc">
    <h1>${doc.id} — ${doc.title}</h1>
    <div class="meta">
      <span><span class="badge ${doc.badge}">${doc.cat}</span></span>
      <span>版本 v1.0</span>
      <span>2026-06-28</span>
    </div>
    ${doc.content || '<p>內容整理中…</p>'}
  </div>`;
  loadChecks(doc.id);
}

// ── Checklist persistence ────────────────────────────────────────
function loadChecks(docId) {
  const saved = JSON.parse(localStorage.getItem('checks_' + docId) || '{}');
  document.querySelectorAll('input[type=checkbox]').forEach((cb, i) => {
    cb.id = 'cb_' + docId + '_' + i;
    const lbl = cb.nextElementSibling;
    if (lbl) lbl.setAttribute('for', cb.id);
    if (saved[i]) cb.checked = true;
    cb.onchange = () => saveChecks(docId);
  });
}

function saveChecks(docId) {
  const state = {};
  document.querySelectorAll('input[type=checkbox]').forEach((cb, i) => {
    if (cb.checked) state[i] = true;
  });
  localStorage.setItem('checks_' + docId, JSON.stringify(state));
}

function resetChecks() {
  const active = document.querySelector('.nav-item.active');
  if (!active) return;
  const docId = active.dataset.id;
  localStorage.removeItem('checks_' + docId);
  document.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
}

// ── Search ───────────────────────────────────────────────────────
function filterNav(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(el => {
    const text = el.textContent.toLowerCase();
    el.style.display = (!q || text.includes(q)) ? '' : 'none';
  });
}

// ── Mobile ───────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── Init ─────────────────────────────────────────────────────────
buildNav();
navigate('HOME');
</script>
</body>
</html>
